<html>
  <head>
    <!-- Заголовок страницы -->
    <title>TeleDisco</title>
    <!-- Подключение внешнего CSS -->

  </head>
  <body>
    <!-- Шапка страницы -->
    <header>
      <p><a href="https://github.com/bbqquuiieedd/website"><b>TeleDisco</b></a> Форма</p>
      <nav>
        <a href="../index.html">Главная</a>
        <a href="media.html">Медиа</a>
        <a href="list.html">Список</a>
        <a href="layout.html">Макет</a>
        <a href="style.html">Стиль</a>
        <a href="test.html">Тест</a>
      </nav>
    </header>
    <main>
      <form>
        <label for="text2">Фамилия:</label>
        <input type="text" id="text2"  name="Фамилия" value="Иванов"><br>
        <label for="text1">Имя:</label>
        <input type="text" id="text1" name="Имя" value="Иван"><br>
        <label for="text3">Отчество:</label>
        <input type="text" id="text3"  name="Отчество" value="Иванович"><br>
        <label for="radio1">Мужчина:</label>
        <input type="radio" id="radio1" name="Пол" value="Мужчина"><br>
        <label for="radio2">Женщина:</label>
        <input type="radio" id="radio2" name="Пол" value="Женщина"><br>
        <label for="checkbox1">Трудоспособный:</label>
        <input type="checkbox" id="checkbox1" name="Трудоспособный"><br>
        <label for="select1">Образование:</label>
        <select name="Образование" id="select1">
          <option value="Студент">Студент</option>
          <option value="Школьник" selected>Школьник</option>
          <option value="Детсадовец">Детсадовец</option>
        </select><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="Email"><br>
        <label for="pass">Пароль:</label>
        <input type="password" id="pass" name="Пароль"><br>
        <label for="phone">Номер телефона:</label>
        <input type="tel" id="phone" name="Номер телефона"><br>
        <input type="submit">
      </form>
    </main>

      <!-- Набор ссылок -->

        <source src="Media/video.mp4" type="video/mp4">
        Video not supported
      </video><br>
      <audio muted controls>
        <source src="Media/meme.mp3" type="audio/mp3">
        Audio not supported
      </audio>

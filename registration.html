<html>
  <head>
    <!-- Заголовок страницы -->
    <title>TeleDisco</title>
    <!-- Подключение внешнего CSS -->
    <link rel="stylesheet" href="registration.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- Шапка страницы-->
    <header>
      <p><a href="https://github.com/bbqquuiieedd/website"><b>TeleDisco</b></a> Регистрация</p>
      <!-- Набор ссылок -->
      <nav>
          <a href="index.html">Главная</a>
      </nav>
    </header>
    <main>
      <div id="container">
        <form>
          <h2>Введите данные</h2>
          <label for="text2">Фамилия:</label>
          <input type="text" id="text2"  name="Фамилия"><br>
          <label for="text1">Имя:</label>
          <input type="text" id="text1" name="Имя"><br>
          <label for="text3">Отчество:</label>
          <input type="text" id="text3"  name="Отчество"><br>
          <div id="floor">
            <label for="radio1">Мужчина:</label>
            <input type="radio" id="radio1" name="Пол" value="Мужчина"><br>
            <label for="radio2">Женщина:</label>
            <input type="radio" id="radio2" name="Пол" value="Женщина"><br>
          </div>
          <label for="email">Email:</label>
          <input type="email" id="email" name="Email"><br>
          <label for="pass">Пароль:</label>
          <input type="password" id="pass" name="Пароль"><br>
          <label for="phone">Номер телефона:</label>
          <input type="tel" id="phone" name="Номер телефона"><br>
          <label for="date">Дата рождения:</label>
          <input type="date" id="date" name="Дата рождения"><br>
          <input type="submit">
        </form>
      </div>
    </main>
  </body>
</html>

<html>
    <head>
        <style>
            body {
                /* 1 белая */
                margin: 10px; 
                /* 2 черная */
                border: 10px solid;
            }
            p {
                /* 3 белая */
                margin: 10px;
                /* 4 черная */
                border: 10px solid;
                /* 5 белая */
                padding: 10px;
            }
        </style>
    </head>
    <body>
      <p>1 белая: body margin<br>
         2 черная: body border<br>
         3 белая: p margin<br>
         4 черная: p border<br>
         5 белая: p padding<br>
      </p>
    </body>
</html>
